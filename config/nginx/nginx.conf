worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Disable gzip globally — OpenChamber compresses itself
    gzip off;

    # Increase body size for file uploads
    client_max_body_size 50M;
    client_body_buffer_size 50M;
    proxy_request_buffering off;

    # WebSocket support — maps Upgrade header to Connection value
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Preserve X-Forwarded-Proto from upstream proxy, default to https
    # (Dokploy/Traefik terminates TLS, so the external protocol is always https)
    map $http_x_forwarded_proto $real_proto {
        default $http_x_forwarded_proto;
        ''      https;
    }

    # Default proxy headers
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_proto;
    proxy_set_header X-Forwarded-Host $host;

    server {
        listen 80;
        server_name _;

        # Debug: log headers for WS endpoints
        log_format ws_debug '$remote_addr - $request - '
            'origin=$http_origin proto=$http_x_forwarded_proto '
            'host=$host fwd_host=$http_x_forwarded_host '
            'upgrade=$http_upgrade real_proto=$real_proto';
        access_log /var/log/nginx/ws_debug.log ws_debug;

        # ── WebSocket endpoints ──

        location = /api/terminal/ws {
            proxy_pass http://openchamber:3000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        location = /api/global/event/ws {
            proxy_pass http://openchamber:3000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        location = /api/event/ws {
            proxy_pass http://openchamber:3000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        # ── SSE endpoints (no buffering) ──

        location = /api/event {
            proxy_pass http://openchamber:3000;
            proxy_set_header Accept "text/event-stream";
            proxy_set_header Cache-Control "no-cache";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        location = /api/global/event {
            proxy_pass http://openchamber:3000;
            proxy_set_header Accept "text/event-stream";
            proxy_set_header Cache-Control "no-cache";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        location = /api/notifications/stream {
            proxy_pass http://openchamber:3000;
            proxy_set_header Accept "text/event-stream";
            proxy_set_header Cache-Control "no-cache";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        location = /api/openchamber/events {
            proxy_pass http://openchamber:3000;
            proxy_set_header Accept "text/event-stream";
            proxy_set_header Cache-Control "no-cache";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        location ~ ^/api/terminal/.+/stream$ {
            proxy_pass http://openchamber:3000;
            proxy_set_header Accept "text/event-stream";
            proxy_set_header Cache-Control "no-cache";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        # ── Catch-all API ──

        location /api {
            proxy_pass http://openchamber:3000;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;
        }

        # ── Everything else (UI) ──

        location / {
            proxy_pass http://openchamber:3000;
        }

        # ── Debug: echo headers ──
        location = /debug/headers {
            default_type text/plain;
            return 200 "origin=$http_origin\nproto=$http_x_forwarded_proto\nhost=$host\nfwd_host=$http_x_forwarded_host\nupgrade=$http_upgrade\nreal_proto=$real_proto\n";
        }
    }
}
